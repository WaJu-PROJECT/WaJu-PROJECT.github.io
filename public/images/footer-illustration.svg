<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Wheelchair User (Elderly) -->
  <circle cx="60" cy="90" r="15" fill="#fca5a5" /> <!-- Head -->
  <rect x="45" y="110" width="30" height="40" rx="5" fill="#f87171" /> <!-- Body -->
  <rect x="40" y="110" width="10" height="30" rx="5" fill="#fca5a5" /> <!-- Arm L -->
  <rect x="70" y="110" width="10" height="30" rx="5" fill="#fca5a5" /> <!-- Arm R -->
  <!-- Wheelchair -->
  <circle cx="70" cy="160" r="25" fill="none" stroke="#6b7280" stroke-width="4" /> <!-- Large Wheel -->
  <circle cx="70" cy="160" r="20" fill="none" stroke="#9ca3af" stroke-width="2" /> <!-- Inner Wheel -->
  <circle cx="45" cy="175" r="10" fill="#4b5563" /> <!-- Small Wheel -->
  <path d="M45 150 L45 175 M70 120 L70 160 M40 140 L80 140 M80 110 L80 140" stroke="#374151" stroke-width="6" stroke-linecap="round" fill="none" /> <!-- Frame -->
  
  <!-- Caregiver -->
  <circle cx="120" cy="65" r="15" fill="#fcd34d" /> <!-- Head -->
  <rect x="105" y="85" width="30" height="45" rx="5" fill="#34d399" /> <!-- Body/Uniform -->
  <rect x="110" y="130" width="10" height="40" rx="5" fill="#3b82f6" /> <!-- Leg L -->
  <rect x="120" y="130" width="10" height="40" rx="5" fill="#3b82f6" /> <!-- Leg R -->
  <rect x="95" y="85" width="10" height="35" rx="5" fill="#fcd34d" transform="rotate(30 100 85)" /> <!-- Arm L reaching out -->
  <rect x="135" y="85" width="10" height="35" rx="5" fill="#fcd34d" /> <!-- Arm R -->
</svg>
